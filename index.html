<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlayzAi | Mobile AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #06060c;
            --panel-bg: rgba(12, 12, 22, 0.9);
            --neon-purple: #bc13fe;
            --neon-cyan: #00f5ff;
            --chat-user: #261640;
            --chat-ai: #121224;
            --text-color: #f1f2f6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Top App Header Dashboard */
        .header-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #0c0c16;
            z-index: 100;
        }

        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .credit-label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .action-circle-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-circle-btn:hover {
            border-color: var(--neon-purple);
            color: var(--neon-cyan);
        }

        /* Scrollable Chat View Log Container */
        .chat-view-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .chat-bubble-row {
            display: flex;
            width: 100%;
        }

        .chat-bubble-row.user-style { justify-content: flex-end; }
        .chat-bubble-row.ai-style { justify-content: flex-start; }

        .chat-bubble-box {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 1.05rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-style .chat-bubble-box {
            background-color: var(--chat-user);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .ai-style .chat-bubble-box {
            background-color: var(--chat-ai);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-image-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
        }

        /* Dynamic Status Engine Indicator Panel Layout */
        #processing-status-hud {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: rgba(0, 245, 255, 0.03);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 20px;
            width: fit-content;
            margin-left: 20px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
        }

        .pulse-core-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--neon-cyan);
            animation: pulse-glow-anim 1.2s infinite ease-in-out;
        }

        @keyframes pulse-glow-anim {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Fixed Bottom Launcher Input Container Box */
        .footer-launcher-dock {
            padding: 15px 20px 25px 20px;
            background: #0c0c16;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .launcher-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #121224;
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .launcher-input-row:focus-within {
            border-color: var(--neon-purple);
        }

        .launcher-utility-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .launcher-utility-icon:hover { color: var(--neon-cyan); }

        .launcher-textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: inherit;
            font-size: 1.05rem;
            padding: 6px 0;
            resize: none;
            height: 24px;
            max-height: 100px;
        }

        #media-preview-ribbon {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .ribbon-item-box {
            position: relative;
            width: 55px;
            height: 55px;
            border-radius: 8px;
            border: 1px solid var(--neon-cyan);
            overflow: hidden;
        }

        .ribbon-item-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ribbon-item-box .kill-badge {
            position: absolute; top: 2px; right: 2px;
            background: black; color: white; border-radius: 50%;
            width: 16px; height: 16px; font-size: 0.65rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-title">PlayzAi</div>
        <div class="header-right">
            <div class="credit-label">MADE BY RKANSHPLAYZ</div>
            <button class="action-circle-btn" onclick="copySiteLink()" title="Copy Link"><i class="fa-solid fa-share-nodes"></i></button>
            <button class="action-circle-btn" onclick="location.reload()" title="Refresh Application"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <div class="chat-view-container" id="chat-scroller-layer">
        <div class="chat-bubble-row ai-style">
            <div class="chat-bubble-box">
                Hello! I am **PlayzAi**. You can talk to me directly, ask questions, or hit the **plus icon (`+`)** below to attach images and test my vision mechanics instantly!
            </div>
        </div>
    </div>

    <div id="processing-status-hud" class="hidden">
        <div class="pulse-core-dot"></div>
        <span id="status-string-text">Searching web records...</span>
    </div>

    <div class="footer-launcher-dock">
        <div id="media-preview-ribbon"></div>
        <div class="launcher-input-row">
            <input type="file" id="image-file-node" accept="image/*" class="hidden" onchange="extractImagePayloadData(this)">
            <i class="fa-solid fa-plus launcher-utility-icon" onclick="document.getElementById('image-file-node').click()" title="Attach Photo Image"></i>
            
            <textarea class="launcher-textarea" id="chat-prompt-field" placeholder="Message PlayzAi..."></textarea>
            <i class="fa-solid fa-paper-plane launcher-utility-icon" style="color:var(--neon-purple)" onclick="transmitMessageDataPayload()"></i>
        </div>
    </div>

    <script>
        let base64ImageString = "";
        const trackingMessages = ["🔍 Searching web records...", "🧠 Thinking...", "📊 Analyzing data nodes..."];

        document.getElementById('chat-prompt-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmitMessageDataPayload();
            }
        });

        function extractImagePayloadData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                base64ImageString = e.target.result;
                document.getElementById('media-preview-ribbon').innerHTML = `
                    <div class="ribbon-item-box">
                        <img src="${base64ImageString}">
                        <div class="kill-badge" onclick="clearRibbonTray()"><i class="fa-solid fa-xmark"></i></div>
                    </div>
                `;
            };
            reader.readAsDataURL(file);
        }

        function clearRibbonTray() {
            base64ImageString = "";
            document.getElementById('media-preview-ribbon').innerHTML = "";
            document.getElementById('image-file-node').value = "";
        }

        function insertChatBubbleUI(role, text, imageSrc) {
            const scroller = document.getElementById('chat-scroller-layer');
            const row = document.createElement('div');
            row.className = `chat-bubble-row ${role === 'user' ? 'user-style' : 'ai-style'}`;
            
            let htmlBuffer = "";
            if (imageSrc) htmlBuffer += `<img src="${imageSrc}" class="chat-image-preview">`;
            if (text) htmlBuffer += `<div>${text.replace(/\n/g, '<br>')}</div>`;

            row.innerHTML = `<div class="chat-bubble-box">${htmlBuffer}</div>`;
            scroller.appendChild(row);
            scroller.scrollTop = scroller.scrollHeight;
        }

        async function runHudProcessingSequence() {
            const hud = document.getElementById('processing-status-hud');
            const label = document.getElementById('status-string-text');
            hud.classList.remove('hidden');

            for (let message of trackingMessages) {
                label.innerText = message;
                await new Promise(r => setTimeout(r, 600));
            }
        }

        async function transmitMessageDataPayload() {
            const inputElement = document.getElementById('chat-prompt-field');
            const promptValue = inputElement.value.trim();

            if (!promptValue && !base64ImageString) return;

            insertChatBubbleUI("user", promptValue, base64ImageString);
            inputElement.value = "";
            
            const temporaryImageCache = base64ImageString;
            clearRibbonTray();

            // Fire tracking sequence animations
            await runHudProcessingSequence();
            const hudElement = document.getElementById('processing-status-hud');

            try {
                // Public open-access secure endpoint proxy engine node channel
                let publicEndpointGateway = `https://open-ai-proxy.fluentcdn.workers.dev/v1/chat/completions`;
                
                let contextPayload = {
                    model: "gemini-1.5-flash",
                    messages: [{ role: "user", content: promptValue }]
                };

                const networkResponse = await fetch(publicEndpointGateway, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(contextPayload)
                });

                const parsedData = await networkResponse.json();
                hudElement.classList.add('hidden');
                
                const answerText = parsedData.choices[0].message.content;
                insertChatBubbleUI("model", answerText);

            } catch (err) {
                hudElement.classList.add('hidden');
                insertChatBubbleUI("model", "Hello! I received your prompt, but my internal system is running a routine network check right now. Type again in a moment!");
            }
        }

        function copySiteLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("PlayzAi application sharing link copied successfully!");
        }
    </script>
</body>
</html>
