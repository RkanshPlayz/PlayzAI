<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlayzAi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #06060c;
            color: #f1f2f6;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #0c0c16;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }
        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #setup-wizard-banner {
            background: #0f0f1f;
            border-bottom: 2px solid #bc13fe;
            padding: 15px 20px;
            box-sizing: border-box;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 55px;
            z-index: 110;
        }
        .key-entry-input {
            width: 100%;
            background: #05050a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }
        .chat-view-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 60px;
            margin-bottom: 110px;
            box-sizing: border-box;
        }
        .chat-bubble-row { display: flex; width: 100%; }
        .chat-bubble-row.user-style { justify-content: flex-end; }
        .chat-bubble-row.ai-style { justify-content: flex-start; }
        .chat-bubble-box {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 1.05rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-style .chat-bubble-box {
            background-color: #261640;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }
        .ai-style .chat-bubble-box {
            background-color: #121224;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-image-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
        }
        #processing-status-hud {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            width: fit-content;
            font-size: 0.9rem;
            color: #00f5ff;
            position: fixed;
            bottom: 105px;
            left: 20px;
            z-index: 99;
        }
        .footer-launcher-dock {
            padding: 12px 15px 35px 15px;
            background: #0c0c16;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 100;
        }
        .launcher-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #121224;
            border-radius: 24px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .launcher-utility-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.25rem;
            cursor: pointer;
        }
        .launcher-textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: inherit;
            font-size: 1.05rem;
            resize: none;
            height: 24px;
        }
        #media-preview-ribbon { display: flex; gap: 8px; margin-bottom: 6px; }
        .ribbon-item-box {
            position: relative; width: 50px; height: 50px; border-radius: 8px; border: 1px solid #00f5ff; overflow: hidden;
        }
        .ribbon-item-box img { width: 100%; height: 100%; object-fit: cover; }
        .ribbon-item-box .kill-badge {
            position: absolute; top: 2px; right: 2px; background: black; color: white; border-radius: 50%;
            width: 14px; height: 14px; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .hidden { display: none !important; }
        .action-circle-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-title">PlayzAi</div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <div style="font-size: 0.9rem; opacity: 0.7;">MADE BY RKANSHPLAYZ</div>
            <button class="action-circle-btn" onclick="toggleSetup()"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <div id="setup-wizard-banner">
        <div style="display: flex; justify-content: space-between; font-weight: bold; color: #bc13fe;">
            <span>🔑 ENTER CURRENT API KEY:</span>
            <a href="https://aistudio.google.com/" target="_blank" style="color: #00f5ff; text-decoration: none;">Get Key &rarr;</a>
        </div>
        <input type="password" class="key-entry-input" id="secure-key-node" placeholder="Paste your raw AQ.Ab8RN... key here" onchange="commitKeyToStorage(this.value)">
    </div>

    <div class="chat-view-container" id="chat-scroller-layer">
        <div class="chat-bubble-row ai-style">
            <div class="chat-bubble-box">
                Hello! I am PlayzAi. To start chatting safely, click the ⚙️ gear icon at the top right, paste your raw API key directly from Google AI Studio, and hit anywhere to save!
            </div>
        </div>
    </div>

    <div id="processing-status-hud" class="hidden">
        <span id="status-string-text">Thinking...</span>
    </div>

    <div class="footer-launcher-dock">
        <div id="media-preview-ribbon"></div>
        <div class="launcher-input-row">
            <input type="file" id="image-file-node" accept="image/*" class="hidden" onchange="extractImagePayloadData(this)">
            <i class="fa-solid fa-plus launcher-utility-icon" onclick="document.getElementById('image-file-node').click()"></i>
            <textarea class="launcher-textarea" id="chat-prompt-field" placeholder="Message PlayzAi..."></textarea>
            <i class="fa-solid fa-paper-plane launcher-utility-icon" style="color:#bc13fe" onclick="transmitMessageDataPayload()"></i>
        </div>
    </div>

    <script>
        var b64Img = "";

        window.onload = function() {
            var savedKey = localStorage.getItem('playzai_key_token');
            if (savedKey) {
                document.getElementById('secure-key-node').value = savedKey;
                document.getElementById('setup-wizard-banner').classList.add('hidden');
            }
        };

        function toggleSetup() {
            document.getElementById('setup-wizard-banner').classList.toggle('hidden');
        }

        function commitKeyToStorage(val) {
            localStorage.setItem('playzai_key_token', val.trim());
            if (val.trim()) document.getElementById('setup-wizard-banner').classList.add('hidden');
        }

        document.getElementById('chat-prompt-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmitMessageDataPayload();
            }
        });

        function extractImagePayloadData(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                b64Img = e.target.result;
                document.getElementById('media-preview-ribbon').innerHTML = 
                    '<div class="ribbon-item-box"><img src="' + b64Img + '"><div class="kill-badge" onclick="clearRibbonTray()">&times;</div></div>';
            };
            reader.readAsDataURL(file);
        }

        function clearRibbonTray() {
            b64Img = "";
            document.getElementById('media-preview-ribbon').innerHTML = "";
            document.getElementById('image-file-node').value = "";
        }

        function insertChatBubbleUI(role, text, imageSrc) {
            var scroller = document.getElementById('chat-scroller-layer');
            var row = document.createElement('div');
            row.className = 'chat-bubble-row ' + (role === 'user' ? 'user-style' : 'ai-style');
            var html = "";
            if (imageSrc) html += '<img src="' + imageSrc + '" class="chat-image-preview">';
            if (text) html += '<div>' + text.replace(/\n/g, '<br>') + '</div>';
            row.innerHTML = '<div class="chat-bubble-box">' + html + '</div>';
            scroller.appendChild(row);
            scroller.scrollTop = scroller.scrollHeight;
        }

        async function transmitMessageDataPayload() {
            var inputElement = document.getElementById('chat-prompt-field');
            var promptValue = inputElement.value.trim();
            var token = localStorage.getItem('playzai_key_token');

            if (!promptValue && !b64Img) return;
            if (!token) {
                alert("Please click the gear icon and add your API key first!");
                document.getElementById('setup-wizard-banner').classList.remove('hidden');
                return;
            }

            insertChatBubbleUI("user", promptValue, b64Img);
            inputElement.value = "";
            
            var tempImg = b64Img;
            clearRibbonTray();

            var hud = document.getElementById('processing-status-hud');
            var txtNode = document.getElementById('status-string-text');
            hud.classList.remove('hidden');

            try {
                var steps = ["Searching...", "Thinking...", "Analyzing..."];
                for(var i=0; i<steps.length; i++) {
                    txtNode.innerText = steps[i];
                    await new Promise(function(r){setTimeout(r,400);});
                }

                var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + token;
                var payload = { contents: [{ parts: [{ text: promptValue }] }] };

                if (tempImg) {
                    payload = {
                        contents: [{
                            parts: [
                                { text: promptValue || "Analyze this image." },
                                { inlineData: { mimeType: "image/jpeg", data: tempImg.split(',')[1] } }
                            ]
                        }]
                    };
                }

                var res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                var data = await res.json();
                hud.classList.add('hidden');
                
                var aiResponse = data.candidates[0].content.parts[0].text;
                insertChatBubbleUI("model", aiResponse);
            } catch (err) {
                hud.classList.add('hidden');
                insertChatBubbleUI("model", "API Error: Please verify that you copied the complete key string from your Google Studio panel.");
            }
        }
    </script>
</body>
</html>
