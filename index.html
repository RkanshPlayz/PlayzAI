<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlayzAi | Mobile Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #06060c;
            --panel-bg: rgba(12, 12, 22, 0.9);
            --neon-purple: #bc13fe;
            --neon-cyan: #00f5ff;
            --chat-user: #261640;
            --chat-ai: #121224;
            --text-color: #f1f2f6;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .header-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #0c0c16;
            z-index: 100;
        }

        .logo-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .credit-label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .action-circle-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #setup-wizard-banner {
            background: #0f0f1f;
            border-bottom: 2px solid var(--neon-purple);
            padding: 15px 20px;
            box-sizing: border-box;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .wizard-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .wizard-instruction-link {
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: bold;
        }

        .key-entry-input {
            width: 100%;
            background: #05050a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }

        .chat-view-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .chat-bubble-row {
            display: flex;
            width: 100%;
        }

        .chat-bubble-row.user-style { justify-content: flex-end; }
        .chat-bubble-row.ai-style { justify-content: flex-start; }

        .chat-bubble-box {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 1.05rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-style .chat-bubble-box {
            background-color: var(--chat-user);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(188, 19, 254, 0.2);
        }

        .ai-style .chat-bubble-box {
            background-color: var(--chat-ai);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-image-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 6px;
            display: block;
        }

        #processing-status-hud {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 245, 255, 0.03);
            border: 1px solid rgba(0, 245, 255, 0.15);
            border-radius: 20px;
            width: fit-content;
            margin-left: 20px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
        }

        .pulse-core-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--neon-cyan);
        }

        .footer-launcher-dock {
            padding: 15px 20px 25px 20px;
            background: #0c0c16;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .launcher-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #121224;
            border-radius: 20px;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .launcher-utility-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .launcher-textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            padding: 8px 0;
            resize: none;
            height: 24px;
        }

        #media-preview-ribbon {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .ribbon-item-box {
            position: relative;
            width: 50px;
            height: 50px;
            border-radius: 6px;
            border: 1px solid var(--neon-cyan);
            overflow: hidden;
        }

        .ribbon-item-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ribbon-item-box .kill-badge {
            position: absolute; top: 1px; right: 1px;
            background: black; color: white; border-radius: 50%;
            width: 14px; height: 14px; font-size: 0.6rem;
            display: flex; align-items: center; justify-content: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="logo-title">PlayzAi</div>
        <div class="header-right">
            <div class="credit-label">MADE BY RKANSHPLAYZ</div>
            <button class="action-circle-btn" onclick="toggleSetupGuide()"><i class="fa-solid fa-gear"></i></button>
            <button class="action-circle-btn" onclick="location.reload()"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>

    <div id="setup-wizard-banner">
        <div class="wizard-row">
            <span style="font-family:'Orbitron'; font-weight:bold; color:var(--neon-purple)">💡 ACTIVATE AI ENGINE:</span>
            <a href="https://aistudio.google.com/" target="_blank" class="wizard-instruction-link">Get Free Key <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:0.75rem"></i></a>
        </div>
        <input type="password" class="key-entry-input" id="secure-key-node" placeholder="Paste key token here..." onchange="commitKeyToStorage(this.value)">
    </div>

    <div class="chat-view-container" id="chat-scroller-layer">
        <div class="chat-bubble-row ai-style">
            <div class="chat-bubble-box">
                Hello! Tap the ⚙️ gear icon, grab your free API key token from the link, and paste it to activate PlayzAi instantly!
            </div>
        </div>
    </div>

    <div id="processing-status-hud" class="hidden">
        <div class="pulse-core-dot"></div>
        <span id="status-string-text">Thinking...</span>
    </div>

    <div class="footer-launcher-dock">
        <div id="media-preview-ribbon"></div>
        <div class="launcher-input-row">
            <input type="file" id="image-file-node" accept="image/*" class="hidden" onchange="extractImagePayloadData(this)">
            <i class="fa-solid fa-plus launcher-utility-icon" onclick="document.getElementById('image-file-node').click()"></i>
            
            <textarea class="launcher-textarea" id="chat-prompt-field" placeholder="Message PlayzAi..."></textarea>
            <i class="fa-solid fa-paper-plane launcher-utility-icon" style="color:var(--neon-purple)" onclick="transmitMessageDataPayload()"></i>
        </div>
    </div>

    <script>
        let base64ImageString = "";
        const trackingMessages = ["🔍 Searching web records...", "🧠 Thinking...", "📊 Analyzing data..."];

        window.onload = () => {
            const preservedKey = localStorage.getItem('playzai_key_token');
            if (preservedKey) {
                document.getElementById('secure-key-node').value = preservedKey;
                document.getElementById('setup-wizard-banner').classList.add('hidden');
            }
        };

        document.getElementById('chat-prompt-field').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                transmitMessageDataPayload();
            }
        });

        function toggleSetupGuide() {
            document.getElementById('setup-wizard-banner').classList.toggle('hidden');
        }

        function commitKeyToStorage(val) {
            localStorage.setItem('playzai_key_token', val.trim());
            if (val.trim()) document.getElementById('setup-wizard-banner').classList.add('hidden');
        }

        function extractImagePayloadData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                base64ImageString = e.target.result;
                document.getElementById('media-preview-ribbon').innerHTML = `
                    <div class="ribbon-item-box">
                        <img src="${base64ImageString}">
                        <div class="kill-badge" onclick="clearRibbonTray()"><i class="fa-solid fa-xmark"></i></div>
                    </div>
                `;
            };
            reader.readAsDataURL(file);
        }

        function clearRibbonTray() {
            base64ImageString = "";
            document.getElementById('media-preview-ribbon').innerHTML = "";
            document.getElementById('image-file-node').value = "";
        }

        function insertChatBubbleUI(role, text, imageSrc) {
            const scroller = document.getElementById('chat-scroller-layer');
            const row = document.createElement('div');
            row.className = `chat-bubble-row ${role === 'user' ? 'user-style' : 'ai-style'}`;
            
            let htmlBuffer = "";
            if (imageSrc) htmlBuffer += `<img src="${imageSrc}" class="chat-image-preview">`;
            if (text) htmlBuffer += `<div>${text.replace(/\n/g, '<br>')}</div>`;

            row.innerHTML = `<div class="chat-bubble-box">${htmlBuffer}</div>`;
            scroller.appendChild(row);
            scroller.scrollTop = scroller.scrollHeight;
        }

        async function runHudProcessingSequence() {
            const hud = document.getElementById('processing-status-hud');
            const label = document.getElementById('status-string-text');
            hud.classList.remove('hidden');

            for (let message of trackingMessages) {
                label.innerText = message;
                await new Promise(r => setTimeout(r, 600));
            }
        }

        async function transmitMessageDataPayload() {
            const inputElement = document.getElementById('chat-prompt-field');
            const promptValue = inputElement.value.trim();
            const token = localStorage.getItem('playzai_key_token');

            if (!promptValue && !base64ImageString) return;
            if (!token) {
                alert("Please add your key first!");
                document.getElementById('setup-wizard-banner').classList.remove('hidden');
                return;
            }

            insertChatBubbleUI("user", promptValue, base64ImageString);
            inputElement.value = "";
            
            const temporaryImageCache = base64ImageString;
            clearRibbonTray();

            await runHudProcessingSequence();
            const hudElement = document.getElementById('processing-status-hud');

            try {
                let targetEndpointUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${token}`;
                let contextPayload = {};

                if (temporaryImageCache) {
                    const extractedBase64Data = temporaryImageCache.split(',')[1];
                    contextPayload = {
                        contents: [{
                            parts: [
                                { text: promptValue || "Analyze this file." },
                                { inlineData: { mimeType: "image/jpeg", data: extractedBase64Data } }
                            ]
                        }]
                    };
                } else {
                    contextPayload = { contents: [{ parts: [{ text: promptValue }] }] };
                }

                const networkResponse = await fetch(targetEndpointUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(contextPayload)
                });

                const parsedData = await networkResponse.json();
                hudElement.classList.add('hidden');
                insertChatBubbleUI("model", parsedData.candidates[0].content.parts[0].text);

            } catch (err) {
                hudElement.classList.add('hidden');
                insertChatBubbleUI("model", "Error: Key expired or invalid. Check your setup.");
            }
        }
    </script>
</body>
</html>
